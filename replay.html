                        <option value="">-- Choose --</option>
                    </select>
                    <div id="driverStatValue" class="stat-value" style="min-height:40px;margin-bottom:8px;">—</div>
                </div>
                <canvas id="driverStatChart" class="stat-chart"></canvas>
            </div>

            <!-- Debug Panel (Right) -->
            <div id="debugPanel" class="debug-panel">
                <h3>Race Stats</h3>
                <div id="raceStatsSection" style="margin-bottom:10px;">
                    <label style="font-size:0.9em;color:#aaa;margin-bottom:5px;display:block;">Select Stat</label>
                    <select id="raceStatSelect" onchange="updateRaceStat()" style="width:100%;padding:6px;background:#1a1a1a;color:#4CAF50;border:1px solid #4CAF50;border-radius:4px;cursor:pointer;font-size:0.85em;">
                        <option value="">-- Choose --</option>
                        <option value="grip">Grip</option>
                        <option value="flagState">Flag State</option>
                        <option value="currentRain">Rain</option>
                        <option value="currentTrackWater">Track Water</option>
                        <option value="drsEnabled">DRS</option>
                    </select>
                </div>
                <div id="raceStatValue" class="stat-value" style="min-height:40px;">—</div>
                <canvas id="raceStatChart" class="stat-chart"></canvas>
            </div>
            
            <!-- Replay Controls (Bottom - Fixed) -->
            <div id="replayControls" class="replay-controls">
                <div class="controls-row">
                    <button id="prevBtn" onclick="previousFrame()">⏮ Prev Frame</button>
                    <button id="playBtn" onclick="togglePlay()">▶ Play</button>
                    <button id="nextBtn" onclick="nextFrame()">Next Frame ⏯</button>
                </div>
                <div class="slider-row">
                    <span id="frameLabel">Frame: 0 / 0</span>
                    <input type="range" id="frameSlider" min="0" max="100" value="0" oninput="seekFrame(this.value)" class="frame-slider" />
                </div>
                <div class="speed-row">
                    <label style="margin:0;font-size:0.9em;color:#aaa;">Playback FPS:</label>
                    <input type="number" id="fpsInput" value="60" min="1" max="240" onchange="setPlaybackFPS(this.value)" style="width:60px;padding:4px;background:#1a1a1a;color:#4CAF50;border:1px solid #4CAF50;border-radius:4px;cursor:pointer;font-size:0.85em;margin-left:5px;"/>
