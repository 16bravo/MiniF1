<!doctype html>
<html lang="fr">

<head>
	<meta charset="utf-8">
	<title>MiniF1 - Race</title>
	<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js">  </script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
		integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">
	<link rel="stylesheet" href="css/race.css">
	<link rel="stylesheet" href="css/home-button.css">
	<!-- Race modules (imported before main race.js) -->
	<script src="js/home-button.js"></script>
	<script src="js/championship_save_select.js"></script>
	<script src="js/weather.js"></script>
	<script src="js/race/state_mappings.js"></script>
	<script src="js/race/race_recorder.js"></script>
	<script src="js/race/utils.js"></script>
	<script src="js/race/tires.js"></script>
	<script src="js/race/physics.js"></script>
	<script src="js/race/ranking.js"></script>
	<script src="js/race/pits.js"></script>
	<script src="js/race/strategy.js"></script>
	<script src="js/race/flags.js"></script>
	<script src="js/race/drs.js"></script>
	<script src="js/race/animation.js"></script>
	<script src="js/race/recording.js"></script>
	<script src="js/race/simulation.js"></script>
	<script src="js/race/ui.js"></script>
	<!-- Main race orchestrator -->
	<script src="js/race.js"></script>
	<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
	<div id="ind">Lap 0</div>
	<div id="screen">
		<div id="tts"></div>

		<i class="fa fa-clock-o" style="font-size:28px" id="clock"></i>

		<div id="flagBanner" style="position:fixed;top:30px;left:50%;transform:translateX(-50%);z-index:1000;opacity:0;transition:opacity 0.3s;font-size:2.5em;font-weight:bold;padding:0.3em 1.2em;border-radius:0.5em;"></div>
		
		<div id="logo">
			<img src="img/logo.png" style="width:100px;margin-left:auto;margin-right:auto;display:block;"></img>
			<div style="width:105px;margin-left:auto;margin-right:auto;display:block;"><span
					id="countryName">BRAZIL</span> <img id="countryFlag" src="img/flags/Brazil.png"
					style="height:15px;"></img></div>
		</div>
		
		<div id="weather"></div>

		<!-- Driver UI elements will be generated dynamically by JS -->
		<div id="driver-ranks"></div>
		<div id="driver-icons"></div>
		<div id="driver-codes"></div>
		<div id="driver-cars"></div>
		<div id="driver-times"></div>
		<div id="driver-tyres"></div>

	</div>
	<canvas id="myCanvas" width="1200" height="800"
		style="position:absolute;left:-350px;top:-195px;z-index:-1000;overflow:hidden;"></canvas>

</body>
</html>
